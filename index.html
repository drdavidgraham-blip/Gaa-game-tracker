<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06140d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Match Tracker</title>
<style>
  :root{
    --bg:#0a0f0c;
    --surface:#141d18;
    --surface-2:#1c2a23;
    --border:#2a3a32;
    --text:#eef5f1;
    --text-dim:#8da39a;
    --home:#22c55e;
    --home-text:#04140a;
    --home-accent:#baffc9;
    --home-dim:#0f3d23;
    --home-shadow:rgba(34,197,94,.55);
    --away:#f97316;
    --away-text:#2a0f00;
    --away-accent:#ffd9b0;
    --away-dim:#4a2308;
    --away-shadow:rgba(249,115,22,.5);
    --yellow:#facc15;
    --black-card:#15181a;
    --red:#ef4444;
    --neutral:#3a4f47;
    --pos-border:#3ddc84;
    --neg-border:#ef6a5a;
    --radius:10px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior:none; user-select:none;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;}
  #app{display:flex; flex-direction:column; height:100vh; height:100dvh;}

  /* ---------- Setup / Resume screens ---------- */
  .center-screen{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; gap:18px; text-align:center;
  }
  .center-screen h1{font-size:26px; margin:0 0 4px;}
  .center-screen p{color:var(--text-dim); margin:0; font-size:14px; max-width:320px;}
  .field{width:100%; max-width:320px; display:flex; flex-direction:column; gap:6px; text-align:left;}
  .field label{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);}
  .field input{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:14px; border-radius:var(--radius); font-size:16px; width:100%;
  }
  .field input:focus{outline:2px solid var(--home);}
  .color-row{display:flex; align-items:center; gap:10px; margin-top:4px;}
  .color-row input[type="color"]{
    width:44px; height:44px; padding:0; border:1px solid var(--border); border-radius:8px;
    background:var(--surface-2); cursor:pointer; flex-shrink:0;
  }
  .swatches{display:flex; flex-wrap:wrap; gap:6px; flex:1;}
  .swatch{
    width:24px; height:24px; border-radius:50%; border:2px solid var(--border); cursor:pointer; padding:0;
  }
  .swatch.sel{border-color:var(--text);}
  .big-btn{
    width:100%; max-width:320px; padding:16px; border:none; border-radius:var(--radius);
    font-size:17px; font-weight:700; letter-spacing:.03em; cursor:pointer;
    background:var(--home); color:#04140a;
  }
  .big-btn.secondary{background:var(--surface-2); color:var(--text); border:1px solid var(--border);}
  .home-badge{display:inline-block; width:12px;height:12px;border-radius:3px;background:var(--home); margin-right:6px; vertical-align:middle;}
  .away-badge{display:inline-block; width:12px;height:12px;border-radius:3px;background:var(--away); margin-right:6px; vertical-align:middle;}

  /* ---------- Scoreboard header ---------- */
  #scoreboard{
    background:#06140d; border-bottom:1px solid var(--border);
    padding:10px 12px 8px; flex-shrink:0;
  }
  .sb-grid{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px;}
  .sb-team{text-align:center; overflow:hidden;}
  .sb-team .name{
    font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; cursor:pointer;
  }
  .sb-team.home .name{color:var(--home-accent);}
  .sb-team.away .name{color:var(--away-accent);}
  .sb-score{
    font-family:"SF Mono","Roboto Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size:34px; font-weight:700; letter-spacing:.04em; line-height:1;
  }
  .sb-team.home .sb-score{color:var(--home-accent); text-shadow:0 0 8px var(--home-shadow);}
  .sb-team.away .sb-score{color:var(--away-accent); text-shadow:0 0 8px var(--away-shadow);}
  .sb-sub{font-size:10px; color:var(--text-dim); margin-top:2px; min-height:12px;}
  .sb-mid{display:flex; flex-direction:column; align-items:center; gap:4px; padding:0 6px;}
  .sb-vs{font-size:10px; color:var(--text-dim); letter-spacing:.15em;}
  .sb-clock{
    font-family:"SF Mono","Roboto Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size:24px; font-weight:700; color:#e8fff0;
    background:#0d1f15; border:1px solid #25402f; border-radius:8px; padding:4px 10px; min-width:84px; text-align:center;
  }
  .sb-half{font-size:10px; color:var(--text-dim); letter-spacing:.1em; text-transform:uppercase; margin-top:3px;}
  .clock-controls{display:flex; gap:6px; margin-top:6px;}
  .clock-controls button{
    border:1px solid var(--border); background:var(--surface-2); color:var(--text);
    border-radius:7px; padding:5px 10px; font-size:11px; font-weight:600; cursor:pointer;
  }
  .clock-controls button.active{background:var(--home); color:var(--home-text); border-color:var(--home);}

  /* ---------- Tab content ---------- */
  #content{flex:1; overflow-y:auto; padding:12px 12px 90px;}
  .section-title{
    font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim);
    margin:14px 0 8px; font-weight:700;
  }
  .section-title:first-child{margin-top:2px;}

  /* score tab columns */
  .score-cols{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .col-head{
    text-align:center; font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:.06em;
    padding:8px; border-radius:8px 8px 0 0;
  }
  .col-head.home{background:var(--home-dim); color:var(--home-accent);}
  .col-head.away{background:var(--away-dim); color:var(--away-accent);}
  .score-col{display:flex; flex-direction:column; gap:8px; background:var(--surface); border-radius:0 0 8px 8px; padding:8px;}

  /* generic tap buttons */
  .tap-btn{
    border:none; border-radius:var(--radius); padding:18px 8px; font-size:15px; font-weight:700;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.15;
    transition:transform .06s ease, filter .06s ease;
  }
  .tap-btn small{font-size:11px; font-weight:600; opacity:.85;}
  .tap-btn:active{transform:scale(.96); filter:brightness(1.15);}
  .tap-btn.home{background:var(--home); color:var(--home-text);}
  .tap-btn.away{background:var(--away); color:var(--away-text);}
  .tap-btn.wide-home{background:var(--surface-2); color:var(--home-accent); border:1px solid var(--home);}
  .tap-btn.wide-away{background:var(--surface-2); color:var(--away-accent); border:1px solid var(--away);}

  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .tap-btn.neutral{background:var(--neutral); color:var(--text); border:1px solid var(--border);}
  .tap-btn.neutral.pos{border:2px solid var(--pos-border);}
  .tap-btn.neutral.neg{border:2px solid var(--neg-border);}
  .stat-pct{font-size:11px; color:var(--text-dim); text-align:center; margin:-4px 0 4px;}

  /* cards tab */
  .team-toggle{display:flex; gap:8px; margin-bottom:10px;}
  .team-toggle button{
    flex:1; padding:12px; border-radius:var(--radius); border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-weight:700; cursor:pointer; font-size:14px;
  }
  .team-toggle button.sel.home{background:var(--home); color:var(--home-text); border-color:var(--home);}
  .team-toggle button.sel.away{background:var(--away); color:var(--away-text); border-color:var(--away);}
  .card-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .tap-btn.yellow-card{background:var(--yellow); color:#2a2300;}
  .tap-btn.black-card{background:var(--black-card); color:#fff; border:1px solid #444;}
  .tap-btn.red-card{background:var(--red); color:#2a0000;}

  /* undo bar */
  .undo-bar{
    margin-top:12px; display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:10px 12px; font-size:12px; color:var(--text-dim);
  }
  .undo-bar button{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:8px 12px; font-weight:700; font-size:12px; cursor:pointer;
  }

  /* log tab */
  .log-half-label{
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim);
    margin:14px 0 6px; padding-bottom:4px; border-bottom:1px solid var(--border);
  }
  .log-row{
    display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:10px; margin-bottom:6px;
  }
  .log-time{
    font-family:"SF Mono","Roboto Mono",ui-monospace,monospace; font-size:13px; color:var(--text-dim);
    width:46px; flex-shrink:0;
  }
  .log-dot{width:10px;height:10px;border-radius:50%; flex-shrink:0;}
  .log-dot.home{background:var(--home);} .log-dot.away{background:var(--away);} .log-dot.neutral{background:var(--neutral);}
  .log-desc{flex:1; font-size:14px;}
  .log-desc .sub{font-size:11px; color:var(--text-dim);}
  .log-del{
    background:none; border:none; color:var(--neg-border); font-size:18px; cursor:pointer; padding:4px 6px;
  }
  .empty-state{color:var(--text-dim); text-align:center; padding:40px 20px; font-size:13px;}

  /* stats tab */
  .stat-table{width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--radius); overflow:hidden; margin-bottom:4px;}
  .stat-table th,.stat-table td{padding:9px 8px; font-size:13px; border-bottom:1px solid var(--border); text-align:center;}
  .stat-table th{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); font-weight:700;}
  .stat-table td:first-child, .stat-table th:first-child{text-align:left; color:var(--text-dim);}
  .stat-table tr:last-child td{border-bottom:none;}
  .stat-table .home-col{color:var(--home-accent); font-weight:700;}
  .stat-table .away-col{color:var(--away-accent); font-weight:700;}
  .share-row{display:flex; gap:8px; margin-top:14px;}
  .share-row button{
    flex:1; padding:13px; border-radius:var(--radius); border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-weight:700; font-size:13px; cursor:pointer;
  }
  .danger-btn{
    width:100%; margin-top:18px; padding:13px; border-radius:var(--radius); border:1px solid var(--neg-border);
    background:transparent; color:var(--neg-border); font-weight:700; font-size:13px; cursor:pointer;
  }
  .hint{font-size:11px; color:var(--text-dim); margin-top:16px; line-height:1.5; text-align:center;}

  /* tab bar */
  #tabbar{
    display:flex; border-top:1px solid var(--border); background:var(--surface);
    flex-shrink:0; padding-bottom:env(safe-area-inset-bottom);
  }
  #tabbar button{
    flex:1; background:none; border:none; color:var(--text-dim); padding:10px 4px 8px;
    display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; font-weight:600; cursor:pointer;
  }
  #tabbar button .ic{font-size:19px;}
  #tabbar button.active{color:var(--home);}

  /* overlay / modal */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:50;
  }
  .modal{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px;
    width:100%; max-width:340px; max-height:80vh; overflow-y:auto;
  }
  .modal h2{margin:0 0 10px; font-size:17px;}
  .modal textarea{
    width:100%; min-height:220px; background:var(--surface-2); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:10px; font-size:12px; font-family:"SF Mono","Roboto Mono",ui-monospace,monospace; resize:vertical;
  }
  .modal-actions{display:flex; gap:8px; margin-top:12px;}
  .modal-actions button{flex:1; padding:12px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; border:1px solid var(--border);}
  .modal-actions .confirm{background:var(--home); color:var(--home-text); border-color:var(--home);}
  .modal-actions .cancel{background:var(--surface-2); color:var(--text);}
  .jersey-field{display:flex; gap:8px; align-items:center; margin-bottom:10px;}
  .jersey-field input{
    flex:1; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:10px; font-size:14px;
  }
  .jersey-field label{font-size:12px; color:var(--text-dim); white-space:nowrap;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================ STATE ============================ */
const STORAGE_KEY = 'gaaMatchTrackerState_v1';
const HISTORY_KEY = 'gaaMatchHistory_v1';
let state = null;
let activeTab = 'score';
let cardTeamSel = 'home';
let clockTickHandle = null;
let setupHomeColor = '#22c55e';
let setupAwayColor = '#f97316';

const EVENT_LABELS = {
  goal:'Goal', point:'Point', twoPt:'2-Pointer', wide:'Wide',
  kickoutWon:'Kick-out Won', kickoutLost:'Kick-out Lost',
  oppKickoutWon:'Opp. Kick-out Won', oppKickoutLost:'Opp. Kick-out Lost',
  foulConceded:'Foul Conceded', foulWon:'Foul Won',
  turnoverFor:'Turnover Won', turnoverAgainst:'Turnover Lost',
  freeWonAdvanced:'Free Won \u2013 Ball Advanced', freeConcededAdvanced:'Free Conceded \u2013 Ball Advanced (Against)',
  yellowCard:'Yellow Card', blackCard:'Black Card', redCard:'Red Card'
};

const PRESET_COLORS = ['#ffffff','#22c55e','#3b82f6','#ef4444','#facc15','#1e3a8a','#7c2d12','#0ea5e9','#a855f7','#f97316','#111827'];

function defaultState(homeName, awayName, homeColor, awayColor){
  return {
    homeName: homeName || 'Home', awayName: awayName || 'Opposition',
    homeColor: homeColor || '#22c55e', awayColor: awayColor || '#f97316',
    half:1, clockRunning:false, clockStart:null, clockElapsed:0,
    half1Duration:null, half2Duration:null, matchEnded:false,
    events:[], nextId:1
  };
}

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function loadHistory(){
  try{
    const raw = localStorage.getItem(HISTORY_KEY);
    if(!raw) return [];
    return JSON.parse(raw);
  }catch(e){ return []; }
}
function saveHistory(arr){ localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); }
function archiveCurrentMatch(){
  if(!state || state.events.length===0) return;
  const history = loadHistory();
  history.unshift({
    id: Date.now(),
    savedAt: new Date().toISOString(),
    state: JSON.parse(JSON.stringify(state))
  });
  saveHistory(history);
}

/* ============================ HELPERS ============================ */
function getElapsedMs(){
  if(state.clockRunning) return state.clockElapsed + (Date.now() - state.clockStart);
  return state.clockElapsed;
}
function fmtTime(ms){
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const m = Math.floor(totalSec/60), s = totalSec%60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function vibrate(){ if(navigator.vibrate) navigator.vibrate(15); }

/* ---- team colour helpers ---- */
function hexToRgb(hex){
  hex = (hex||'').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(hex.length!==6) hex = '888888';
  const num = parseInt(hex,16);
  return {r:(num>>16)&255, g:(num>>8)&255, b:num&255};
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function relLuminance({r,g,b}){
  const a=[r,g,b].map(v=>{ v/=255; return v<=0.03928? v/12.92 : Math.pow((v+0.055)/1.055,2.4);});
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}
function contrastText(hex){
  return relLuminance(hexToRgb(hex)) > 0.45 ? '#04140a' : '#ffffff';
}
function mixColor(hex, target, factor){
  const c = hexToRgb(hex);
  return rgbToHex(c.r+(target.r-c.r)*factor, c.g+(target.g-c.g)*factor, c.b+(target.b-c.b)*factor);
}
function dimColor(hex){ return mixColor(hex, {r:10,g:15,b:12}, 0.78); }
function accentColor(hex){ return mixColor(hex, {r:255,g:255,b:255}, 0.5); }
function shadowRgba(hex, alpha){
  const c = hexToRgb(hex);
  return 'rgba('+c.r+','+c.g+','+c.b+','+alpha+')';
}
function applyTeamColors(hc, ac){
  const root = document.documentElement.style;
  hc = hc || (state && state.homeColor) || '#22c55e';
  ac = ac || (state && state.awayColor) || '#f97316';
  root.setProperty('--home', hc);
  root.setProperty('--home-text', contrastText(hc));
  root.setProperty('--home-accent', accentColor(hc));
  root.setProperty('--home-dim', dimColor(hc));
  root.setProperty('--home-shadow', shadowRgba(hc, .55));
  root.setProperty('--away', ac);
  root.setProperty('--away-text', contrastText(ac));
  root.setProperty('--away-accent', accentColor(ac));
  root.setProperty('--away-dim', dimColor(ac));
  root.setProperty('--away-shadow', shadowRgba(ac, .5));
}

function teamStats(team, s=state){
  const evs = s.events.filter(e=>e.team===team);
  const goals = evs.filter(e=>e.type==='goal').length;
  const points = evs.filter(e=>e.type==='point').length;
  const twoPt = evs.filter(e=>e.type==='twoPt').length;
  const wides = evs.filter(e=>e.type==='wide').length;
  const totalPoints = points + twoPt*2;
  const total = goals*3 + totalPoints;
  const scores = goals+points+twoPt;
  const attempts = scores+wides;
  const accuracy = attempts ? Math.round((scores/attempts)*1000)/10 : 0;
  return {goals, points, twoPt, wides, totalPoints, total, scores, attempts, accuracy};
}
function scoreNotation(s){
  return s.goals + '-' + String(s.totalPoints).padStart(2,'0');
}
function homeExtra(s=state){
  const c = t => s.events.filter(e=>e.type===t).length;
  const ko=c('kickoutWon'), kl=c('kickoutLost');
  const oko=c('oppKickoutWon'), okl=c('oppKickoutLost');
  return {
    kickoutWon:ko, kickoutLost:kl, kickoutPct:(ko+kl)?Math.round(ko/(ko+kl)*1000)/10:0,
    oppKickoutWon:oko, oppKickoutLost:okl, oppKickoutPct:(oko+okl)?Math.round(oko/(oko+okl)*1000)/10:0,
    foulConceded:c('foulConceded'), foulWon:c('foulWon'),
    turnoverFor:c('turnoverFor'), turnoverAgainst:c('turnoverAgainst'),
    freeWonAdvanced:c('freeWonAdvanced'), freeConcededAdvanced:c('freeConcededAdvanced')
  };
}
function cardStats(team, s=state){
  const evs = s.events.filter(e=>e.team===team);
  const jerseysFor = t => evs.filter(e=>e.type===t && e.jersey).map(e=>'#'+e.jersey);
  return {
    yellow: evs.filter(e=>e.type==='yellowCard').length, yellowJerseys: jerseysFor('yellowCard'),
    black: evs.filter(e=>e.type==='blackCard').length, blackJerseys: jerseysFor('blackCard'),
    red: evs.filter(e=>e.type==='redCard').length, redJerseys: jerseysFor('redCard')
  };
}

/* ============================ ACTIONS ============================ */
function recordEvent(type, team=null, jersey=null){
  const elapsedSec = Math.floor(getElapsedMs()/1000);
  state.events.push({id:state.nextId++, half:state.half, time:elapsedSec, team, type, jersey: jersey||null});
  save(); vibrate(); render();
}
function undoEvent(id){
  state.events = state.events.filter(e=>e.id!==id);
  save(); render();
}
function undoLast(){
  if(state.events.length===0) return;
  const lastId = state.events[state.events.length-1].id;
  undoEvent(lastId);
}
function toggleClock(){
  if(state.clockRunning){
    state.clockElapsed = getElapsedMs();
    state.clockRunning = false; state.clockStart = null;
    stopTicker();
  } else {
    state.clockRunning = true; state.clockStart = Date.now();
    startTicker();
  }
  save(); render();
}
function endHalf(){
  if(state.half===1){
    state.half1Duration = getElapsedMs();
    state.clockRunning=false; state.clockStart=null; state.clockElapsed=0;
    state.half = 2;
  } else if(state.half===2){
    state.half2Duration = getElapsedMs();
    state.clockRunning=false; state.clockStart=null;
    state.matchEnded = true;
    activeTab = 'stats';
  }
  stopTicker();
  save(); render();
}
function startTicker(){
  stopTicker();
  clockTickHandle = setInterval(()=>{
    const el = document.getElementById('sbClock');
    if(el) el.textContent = fmtTime(getElapsedMs());
  }, 1000);
}
function stopTicker(){
  if(clockTickHandle){ clearInterval(clockTickHandle); clockTickHandle=null; }
}
function newMatch(){
  if(!confirm('Start a new match? The current match will be saved to Match History and the screen cleared.')) return;
  archiveCurrentMatch();
  localStorage.removeItem(STORAGE_KEY);
  state = null; activeTab='score'; cardTeamSel='home';
  stopTicker();
  render();
}
function renameTeam(team){
  const current = team==='home' ? state.homeName : state.awayName;
  const next = prompt('Team name', current);
  if(next && next.trim()){
    if(team==='home') state.homeName = next.trim(); else state.awayName = next.trim();
    save(); render();

/* ============================ TEXT EXPORT ============================ */
function buildSummaryText(s=state){
  const h = teamStats('home', s), a = teamStats('away', s);
  const ex = homeExtra(s);
  const hc = cardStats('home', s), ac = cardStats('away', s);
  let t = '';
  t += s.homeName + ' vs ' + s.awayName + '\n';
  t += 'FINAL SCORE\n';
  t += s.homeName + ': ' + scoreNotation(h) + '  (' + h.total + ' pts)' + (h.twoPt? '  [' + h.twoPt + ' x 2-pt]':'') + '\n';
  t += s.awayName + ': ' + scoreNotation(a) + '  (' + a.total + ' pts)' + (a.twoPt? '  [' + a.twoPt + ' x 2-pt]':'') + '\n';
  t += '\nSCORING BREAKDOWN\n';
  t += s.homeName + ' - Goals: ' + h.goals + ', Points: ' + h.points + ', 2-Pointers: ' + h.twoPt + ', Wides: ' + h.wides + ', Accuracy: ' + h.accuracy + '%\n';
  t += s.awayName + ' - Goals: ' + a.goals + ', Points: ' + a.points + ', 2-Pointers: ' + a.twoPt + ', Wides: ' + a.wides + ', Accuracy: ' + a.accuracy + '%\n';
  t += '\n' + s.homeName.toUpperCase() + ' TEAM STATS\n';
  t += 'Kick-outs retained: ' + ex.kickoutWon + '/' + (ex.kickoutWon+ex.kickoutLost) + ' (' + ex.kickoutPct + '%)\n';
  t += 'Opposition kick-outs won: ' + ex.oppKickoutWon + '/' + (ex.oppKickoutWon+ex.oppKickoutLost) + ' (' + ex.oppKickoutPct + '%)\n';
  t += 'Fouls conceded: ' + ex.foulConceded + '  |  Fouls won: ' + ex.foulWon + '\n';
  t += 'Turnovers won: ' + ex.turnoverFor + '  |  Turnovers lost: ' + ex.turnoverAgainst + '\n';
  t += 'Free won - ball advanced: ' + ex.freeWonAdvanced + '  |  Free conceded - ball advanced against: ' + ex.freeConcededAdvanced + '\n';
  t += '\nCARDS\n';
  const cardField = (count, jerseys) => count + (jerseys.length ? ' (' + jerseys.join(', ') + ')' : '');
  t += s.homeName + ' - Yellow: ' + cardField(hc.yellow, hc.yellowJerseys) + ', Black: ' + cardField(hc.black, hc.blackJerseys) + ', Red: ' + cardField(hc.red, hc.redJerseys) + '\n';
  t += s.awayName + ' - Yellow: ' + cardField(ac.yellow, ac.yellowJerseys) + ', Black: ' + cardField(ac.black, ac.blackJerseys) + ', Red: ' + cardField(ac.red, ac.redJerseys) + '\n';
  const dur1 = s.half1Duration!=null ? fmtTime(s.half1Duration) : '-';
  const dur2 = s.half2Duration!=null ? fmtTime(s.half2Duration) : '-';
  t += '\nHalf 1 duration: ' + dur1 + '   Half 2 duration: ' + dur2 + '\n';
  return t;
}
function buildLogText(s=state){
  let t = 'Half\tTime\tTeam\tEvent\tJersey\n';
  s.events.forEach(e=>{
    const team = e.team==='home' ? s.homeName : e.team==='away' ? s.awayName : '-';
    t += e.half + '\t' + fmtTime(e.time*1000) + '\t' + team + '\t' + EVENT_LABELS[e.type] + '\t' + (e.jersey||'') + '\n';
  });
  return t;
}
async function shareText(text, title){
  if(navigator.share){
    try{ await navigator.share({title, text}); return; }catch(e){ /* fall through */ }
  }
  showTextModal(title, text);
}
function fmtHistoryDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function renderHistoryRows(){
  const history = loadHistory();
  if(history.length===0){
    return '<div class="empty-state" style="padding:20px 0;">No saved matches yet.<br>Completed matches are saved here when you start a new match.</div>';
  }
  return history.map(rec=>{
    const s = rec.state;
    const h = teamStats('home', s), a = teamStats('away', s);
    return `<div class="log-row" style="align-items:flex-start; flex-wrap:wrap;">
      <div style="flex:1; min-width:0;">
        <div style="font-size:11px; color:var(--text-dim); margin-bottom:2px;">${fmtHistoryDate(rec.savedAt)}</div>
        <div style="font-size:14px; font-weight:700;">${escapeHtml(s.homeName)} ${scoreNotation(h)} – ${scoreNotation(a)} ${escapeHtml(s.awayName)}</div>
      </div>
      <div style="display:flex; gap:6px; margin-top:6px; width:100%;">
        <button class="hist-share" data-id="${rec.id}" style="flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-weight:700; font-size:12px; cursor:pointer;">Share Summary</button>
        <button class="hist-delete" data-id="${rec.id}" style="padding:8px 12px; border-radius:8px; border:1px solid var(--neg-border); background:transparent; color:var(--neg-border); font-weight:700; font-size:12px; cursor:pointer;">Delete</button>
      </div>
    </div>`;
  }).join('');
}
function bindHistoryActions(container, onChange){
  container.querySelectorAll('.hist-share').forEach(btn=>{
    btn.onclick = ()=>{
      const rec = loadHistory().find(r=>r.id===Number(btn.dataset.id));
      if(rec) shareText(buildSummaryText(rec.state), 'Match Summary');
    };
  });
  container.querySelectorAll('.hist-delete').forEach(btn=>{
    btn.onclick = ()=>{
      if(!confirm('Delete this saved match?')) return;
      const updated = loadHistory().filter(r=>r.id!==Number(btn.dataset.id));
      saveHistory(updated);
      onChange();
    };
  });
  const clearBtn = container.querySelector('.clear-history-btn');
  if(clearBtn) clearBtn.onclick = ()=>{
    if(confirm('Delete all saved match history? This cannot be undone.')){
      saveHistory([]);
      onChange();
    }
  };
}
function showHistoryModal(){
  const overlay = document.createElement('div');
  overlay.className='overlay';
  renderHistoryModal(overlay);
  document.body.appendChild(overlay);
}
function renderHistoryModal(overlay){
  const history = loadHistory();
  overlay.innerHTML = `<div class="modal">
    <h2>Match History</h2>
    ${renderHistoryRows()}
    <div class="modal-actions">
      <button class="cancel" id="closeHistoryBtn">Close</button>
      ${history.length>0 ? '<button class="confirm clear-history-btn" style="background:var(--neg-border); border-color:var(--neg-border); color:#2a0000;">Delete All</button>' : ''}
    </div>
  </div>`;
  document.getElementById('closeHistoryBtn').onclick = ()=>overlay.remove();
  bindHistoryActions(overlay, ()=>{ renderHistoryModal(overlay); render(); });
}
function showTextModal(title, text){
  const overlay = document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML = `<div class="modal">
    <h2>${title}</h2>
    <textarea readonly id="exportArea">${text.replace(/</g,'&lt;')}</textarea>
    <div class="modal-actions">
      <button class="cancel" id="closeModalBtn">Close</button>
      <button class="confirm" id="copyModalBtn">Copy</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('closeModalBtn').onclick = ()=>overlay.remove();
  document.getElementById('copyModalBtn').onclick = ()=>{
    const ta = document.getElementById('exportArea');
    ta.select();
    try{
      navigator.clipboard.writeText(text);
    }catch(e){ document.execCommand('copy'); }
    document.getElementById('copyModalBtn').textContent = 'Copied!';
  };
}

/* ============================ RENDER ============================ */
function render(){
  const app = document.getElementById('app');
  if(!state){
    applyTeamColors(setupHomeColor, setupAwayColor);
    app.innerHTML = renderSetup();
    bindSetup();
    return;
  }
  applyTeamColors();
  app.innerHTML = renderMain();
  bindMain();
  const clockEl = document.getElementById('sbClock');
  if(clockEl) clockEl.textContent = fmtTime(getElapsedMs());
  if(state.clockRunning) startTicker(); else stopTicker();
}

  ).join('');
  return `
  <div class="center-screen">
    <h1>🏐 Match Tracker</h1>
    <p>Enter the team names and pick a colour for each side. All data is saved on this device only — no internet needed.</p>

function bindSetup(){
  document.getElementById('startMatchBtn').onclick = ()=>{
    const h = document.getElementById('homeNameInput').value.trim() || 'Home';
    const a = document.getElementById('awayNameInput').value.trim() || 'Opposition';
    const hc = document.getElementById('homeColorInput').value || setupHomeColor;
    const ac = document.getElementById('awayColorInput').value || setupAwayColor;
    state = defaultState(h, a, hc, ac);
    save(); render();
  };
  const viewHistorySetupBtn = document.getElementById('viewHistorySetupBtn');
  if(viewHistorySetupBtn) viewHistorySetupBtn.onclick = showHistoryModal;
  document.getElementById('homeColorInput').oninput = (e)=>{
    setupHomeColor = e.target.value;
    document.querySelectorAll('#homeSwatches .swatch').forEach(s=>s.classList.toggle('sel', s.dataset.color.toLowerCase()===setupHomeColor.toLowerCase()));
    applyTeamColors(setupHomeColor, setupAwayColor);
  };
  document.getElementById('awayColorInput').oninput = (e)=>{
    setupAwayColor = e.target.value;
    document.querySelectorAll('#awaySwatches .swatch').forEach(s=>s.classList.toggle('sel', s.dataset.color.toLowerCase()===setupAwayColor.toLowerCase()));
    applyTeamColors(setupHomeColor, setupAwayColor);
  };
  document.querySelectorAll('.swatch').forEach(sw=>{
    sw.onclick = ()=>{
      const c = sw.dataset.color, team = sw.dataset.team;
      if(team==='home'){
        setupHomeColor = c;
        document.getElementById('homeColorInput').value = c;
        document.querySelectorAll('#homeSwatches .swatch').forEach(s=>s.classList.toggle('sel', s===sw));
      } else {
        setupAwayColor = c;
        document.getElementById('awayColorInput').value = c;
        document.querySelectorAll('#awaySwatches .swatch').forEach(s=>s.classList.toggle('sel', s===sw));
      }
      applyTeamColors(setupHomeColor, setupAwayColor);
    };
  });
}

}

function renderHistoryTab(){
  const history = loadHistory();
  return `
  <div class="section-title">Saved Matches</div>
  ${renderHistoryRows()}
  ${history.length>0 ? '<button class="danger-btn clear-history-btn">Delete All History</button>' : ''}
  `;
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ============================ BIND EVENTS ============================ */
function bindMain(){
  // tab bar
  document.querySelectorAll('#tabbar button').forEach(btn=>{
    btn.onclick = ()=>{ activeTab = btn.dataset.tab; render(); };
  });
  // clock controls
  const clockBtn = document.getElementById('clockToggleBtn');
  if(clockBtn) clockBtn.onclick = toggleClock;
  const endHalfBtn = document.getElementById('endHalfBtn');
  if(endHalfBtn) endHalfBtn.onclick = ()=>{
    if(state.matchEnded) return;
    if(confirm(state.half===1 ? 'End the first half and start the second half clock?' : 'End the match? You can still review and adjust stats afterwards.')){
      endHalf();
    }
  };
  // rename team
  document.querySelectorAll('[data-rename]').forEach(el=>{
    el.onclick = ()=>renameTeam(el.dataset.rename);
  });
  // generic action buttons
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick = ()=>{
      const action = btn.dataset.action, team = btn.dataset.team || null;
      let jersey = null;
      if(['yellowCard','blackCard','redCard'].includes(action)){
        const ji = document.getElementById('jerseyInput');
        if(ji && ji.value) jersey = ji.value;
      }
      recordEvent(action, team, jersey);
      if(['yellowCard','blackCard','redCard'].includes(action)){
        const ji = document.getElementById('jerseyInput');
        if(ji) ji.value = '';
      }
    };
  });
  // undo last
  const undoBtn = document.getElementById('undoLastBtn');
  if(undoBtn) undoBtn.onclick = undoLast;
  // log undo
  document.querySelectorAll('[data-undoid]').forEach(btn=>{
    btn.onclick = ()=>undoEvent(Number(btn.dataset.undoid));
  });
  // card team toggle
  document.querySelectorAll('[data-cardteam]').forEach(btn=>{
    btn.onclick = ()=>{ cardTeamSel = btn.dataset.cardteam; render(); };
  });
  // share / reset
  const editHomeColorInput = document.getElementById('editHomeColorInput');
  if(editHomeColorInput) editHomeColorInput.oninput = (e)=>{
    state.homeColor = e.target.value; save(); applyTeamColors();
  };
  const editAwayColorInput = document.getElementById('editAwayColorInput');
  if(editAwayColorInput) editAwayColorInput.oninput = (e)=>{
    state.awayColor = e.target.value; save(); applyTeamColors();
  };
  const shareSummaryBtn = document.getElementById('shareSummaryBtn');
  if(shareSummaryBtn) shareSummaryBtn.onclick = ()=>shareText(buildSummaryText(), 'Match Summary');
  const shareLogBtn = document.getElementById('shareLogBtn');
  if(shareLogBtn) shareLogBtn.onclick = ()=>shareText(buildLogText(), 'Match Event Log');
  const newMatchBtn = document.getElementById('newMatchBtn');
  if(newMatchBtn) newMatchBtn.onclick = newMatch;
  // history tab
  if(activeTab==='history'){
    bindHistoryActions(document.getElementById('content'), render);
  }
}

/* ============================ INIT ============================ */
(function init(){
  state = load();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
